<html>
  <head>
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="動画とコードで学ぶ Flutter 開発。入門から応用まで全 46 レッスン。"
    />

    <!-- iOS meta tags & icons -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Flutter講座" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@rubydog_jp" />
    <meta name="twitter:creator" content="@rubydog_jp" />

    <!-- OGP -->
    <meta property="og:title" content="Flutter講座 | Rubydog JP" />
    <meta
      property="og:description"
      content="動画とコードで学ぶ Flutter 開発。入門から応用まで全 46 レッスン。"
    />
    <meta
      property="og:image"
      content="https://github.com/rbdog/flutter_note/blob/main/static/flutter-dog-header.png?raw=true"
    />

    <link rel="apple-touch-icon" href="icons/Icon-192.png" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <meta name="version" content="__COMMIT_SHA__" />
    <title>Flutter講座 | Rubydog JP</title>
    <link rel="manifest" href="manifest.json" />

    <style>
      body {
        margin: 0;
        background-color: #f0f9ff;
      }
      .loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #f0f9ff;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      .loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .loading-title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: #0c4a6e;
        margin-bottom: 32px;
        letter-spacing: 0.5px;
      }
      .loading-dots {
        display: flex;
        gap: 10px;
      }
      .loading-dots span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background-color: #0ea5e9;
        animation: bounce 1.2s ease-in-out infinite;
      }
      .loading-dots span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .loading-dots span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0.6);
          opacity: 0.4;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="loading" class="loading">
      <div class="loading-title">Flutter 講座</div>
      <div class="loading-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <script src="main.dart.js" type="application/javascript"></script>
  </body>
</html>
